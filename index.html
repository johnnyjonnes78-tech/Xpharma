<body>

  <!-- Overlay OUTSIDE sidebar so it covers the screen independently -->
  <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

  <aside id="app-sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon" id="sidebar-logo-icon"><i data-lucide="activity"></i></div>
      <div class="sidebar-logo-text">
        <div class="sidebar-logo-title" id="pharmacy-name-display">Ordive<span style="color:var(--accent)">X</span>
        </div>
        <div class="sidebar-logo-subtitle" id="pharmacy-slogan-display">Santé & Technologie</div>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="sidebar-sync" id="sidebar-sync">
        <div class="sync-dot online" id="sync-dot"></div>
        <span class="sync-text" id="sync-text">En ligne</span>
      </div>
      <div class="sidebar-user" id="sidebar-user">

            <path d="m17 8 4 4-4 4" />

      </div>

  <header id="app-topbar">
    <button class="topbar-menu-btn" onclick="toggleSidebar()" title="Menu"><i data-lucide="menu"></i></button>
    <div class="topbar-title" id="topbar-title">Tableau de Bord</div>
    <div style="flex:1"></div>
    <div class="topbar-actions">
      <button class="topbar-btn" id="pwa-install-btn" onclick="installPWA()" title="Installer l'app"
        style="display:none"><i data-lucide="smartphone"></i></button>
      <button class="topbar-btn" id="device-sync-btn" onclick="if(window.UI && UI.openSyncMonitor) UI.openSyncMonitor()" title="Moniteur de Réseau">
        <i data-lucide="monitor" id="device-sync-icon"></i>
        <span class="notif-badge" id="device-sync-badge" style="display:none; background:var(--warning); color:#fff;">!</span>
      </button>
      <button class="topbar-btn" onclick="navigatePage('reorder')" title="Réapprovisionnement"><i
          data-lucide="refresh-cw"></i></button>
      <button class="topbar-btn" onclick="navigatePage('print')" title="Impression"><i
          data-lucide="printer"></i></button>
      <button class="topbar-btn" id="notif-btn" onclick="navigatePage('alerts')" title="Alertes">
        <i data-lucide="bell"></i><span class="notif-badge" id="notif-count" style="display:none">0</span>
      </button>
      <button class="topbar-btn" onclick="DB.doBackup ? DB.doBackup() : UI.toast('Backup...','info')"
        title="Sauvegarde"><i data-lucide="save"></i></button>
      <button class="topbar-btn" id="theme-toggle-btn" onclick="UI.toggleTheme()" title="Changer le thème"><i
          data-lucide="moon"></i></button>
      <button class="topbar-btn" id="topbar-settings-btn" onclick="navigatePage('settings')" title="Paramètres"><i
          data-lucide="settings-2"></i></button>
    </div>
  </header>

  <main id="app-content">
    <div class="loading-state">
      <div class="spinner"></div>
      <p>Démarrage de OrdiveX...</p>
    </div>
  </main>


  <div id="toast-container"></div>

  <!-- Device Sync Monitor Modal -->
  <div id="sync-monitor-modal" class="modal-overlay" style="display: none; z-index: 10000; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.5); justify-content: center; align-items: center;">
    <div class="modal-content" style="background: var(--surface); padding: 24px; border-radius: 12px; width: 90%; max-width: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);">
      <h3 style="margin-top:0; font-size: 1.2rem; display: flex; align-items: center; gap: 8px;">
        <i data-lucide="monitor-speaker"></i> Moniteur de Réseau
      </h3>
      <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 20px;">
        État en temps réel de la synchronisation des différents appareils (PC, Tablettes, Mobiles).
      </p>
      <div id="sync-monitor-list" style="display: flex; flex-direction: column; gap: 12px; max-height: 50vh; overflow-y: auto;">
        <!-- Devices listed here dynamically -->
      </div>
      <div style="margin-top: 24px; display: flex; justify-content: space-between; align-items: center;">
        <span style="font-size: 0.8rem; color: var(--text-muted);" id="current-device-id-display"></span>
        <button onclick="document.getElementById('sync-monitor-modal').style.display='none'" class="btn btn-primary" style="background: var(--primary); color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 500;">Fermer</button>
      </div>
    </div>
  </div>

  <!-- ═══ BOTTOM TAB BAR — Mobile POS uniquement ═══ -->

      <span>Produits</span>

    <button class="tab-btn" data-vue="panier" onclick="mobileShowVue('panier')">

      <span>Menu</span>
    </button>

  <script>
    const NAV_ITEMS = [
      { section: 'Principal' },
      { page: 'dashboard', icon: 'layout-dashboard', label: 'Tableau de Bord', roles: ['admin', 'pharmacien', 'caissier'] },
      { page: 'pos', icon: 'monitor-smartphone', label: 'Point de Vente', roles: ['admin', 'pharmacien', 'caissier'] },
      { page: 'caisse', icon: 'banknote', label: 'Caisse Journalière', roles: ['admin', 'pharmacien', 'caissier'] },
      { section: 'Stock & Produits' },
      { page: 'products', icon: 'pill', label: 'Catalogue Produits', roles: ['admin', 'pharmacien'] },
      { page: 'stock', icon: 'package-search', label: 'Gestion des Stocks', roles: ['admin', 'pharmacien'] },
      { page: 'reorder', icon: 'refresh-ccw-dot', label: 'Réapprovisionnement', roles: ['admin', 'pharmacien'] },
      { section: 'Ordonnances & Patients' },
      { page: 'prescriptions', icon: 'file-text', label: 'Ordonnances', roles: ['admin', 'pharmacien'] },
      { page: 'patients', icon: 'users', label: 'Dossiers Patients', roles: ['admin', 'pharmacien'] },
      { section: 'Achats' },
      { page: 'suppliers', icon: 'factory', label: 'Fournisseurs', roles: ['admin', 'pharmacien'] },
      { page: 'purchase-orders', icon: 'clipboard-list', label: 'Bons de Commande', roles: ['admin', 'pharmacien'] },
      { section: 'Traçabilité' },
      { page: 'traceability', icon: 'shield-check', label: 'Traçabilité & Pharmavig.', roles: ['admin', 'pharmacien'] },
      { section: 'Analytique' },
      { page: 'sales', icon: 'history', label: 'Historique Ventes', roles: ['admin', 'pharmacien', 'caissier'] },
      { page: 'returns', icon: 'undo-2', label: 'Retours Médicaments', roles: ['admin', 'pharmacien'] },
      { page: 'reports', icon: 'bar-chart-3', label: 'Rapports & Analytique', roles: ['admin', 'pharmacien'] },
      { page: 'metrics', icon: 'bar-chart-2', label: 'Métriques Business', roles: ['admin', 'pharmacien'] },
      { section: 'Administration' },
      { page: 'print', icon: 'printer', label: "Centre d'Impression", roles: ['admin', 'pharmacien'] },
      { page: 'alerts', icon: 'bell', label: 'Alertes', roles: ['admin', 'pharmacien', 'caissier'] },
      { page: 'settings', icon: 'settings-2', label: 'Paramètres', roles: ['admin', 'manager'] },
    ];

    const PAGE_TITLES = {
      dashboard: 'Tableau de Bord', pos: 'Point de Vente', caisse: 'Caisse Journalière',
      products: 'Catalogue Médicaments', stock: 'Gestion des Stocks', reorder: 'Réapprovisionnement',
      prescriptions: 'Gestion des Ordonnances', patients: 'Dossiers Patients',
      suppliers: 'Fournisseurs', 'purchase-orders': 'Bons de Commande',
      traceability: 'Traçabilité & Pharmacovigilance',
      sales: 'Historique des Ventes', returns: 'Retours de Médicaments', reports: 'Rapports & Analytique',
      metrics: 'Métriques Business', onboarding: 'Configuration Initiale',
      print: "Centre d'Impression", alerts: 'Alertes Système', settings: 'Paramètres & Administration',
    };

    function initSidebar() {
      const nav = document.getElementById('sidebar-nav');
      if (!nav || !DB.AppState.currentUser) return;
      const user = DB.AppState.currentUser;

      // Filter visible items first
      const visibleItems = NAV_ITEMS.filter(item => {
        if (item.section) return true; // Keep sections for now
        return item.roles.includes(user.role);
      });

      // Filter out sections that don't have subsequent items
      const finalItems = [];
      for (let i = 0; i < visibleItems.length; i++) {
        const item = visibleItems[i];
        if (item.section) {
          // Look ahead to see if there's any non-section item before the next section
          let hasContent = false;
          for (let j = i + 1; j < visibleItems.length; j++) {
            if (visibleItems[j].section) break;
            if (visibleItems[j].page) {
              hasContent = true;
              break;
            }
          }
          if (hasContent) finalItems.push(item);
        } else {
          finalItems.push(item);
        }
      }

      nav.innerHTML = finalItems.map(item => {
        if (item.section) return '<div class="nav-section">' + item.section + '</div>';
        return '<button class="nav-item" data-page="' + item.page + '" onclick="navigatePage(\'' + item.page + '\')">'
          + '<span class="nav-icon"><i data-lucide="' + item.icon + '"></i></span>'
          + '<span class="nav-label">' + item.label + '</span>'
          + '</button>';
      }).join('');
      if (window.lucide) {
        lucide.createIcons();
      }
    }

    function toggleSidebar() {
      const sidebar = document.getElementById('app-sidebar');
      const overlay = document.getElementById('sidebar-overlay');

      if (window.innerWidth <= 768) {
        // Mobile: use 'show' class for off-canvas
        const isOpen = sidebar.classList.contains('show');
        if (isOpen) {
          sidebar.classList.remove('show');
          if (overlay) overlay.classList.remove('show');
        } else {
          sidebar.classList.add('show');
          if (overlay) overlay.classList.add('show');
        }
      } else {
        // Desktop: use 'collapsed' class
        sidebar.classList.toggle('collapsed');
      }
    }

    // Auto-close sidebar on mobile after navigation
    function closeSidebarMobile() {
      if (window.innerWidth <= 768) {
        const sidebar = document.getElementById('app-sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        if (sidebar) sidebar.classList.remove('show');
        if (overlay) overlay.classList.remove('show');
      }
    }

    function updateTopbar() {
      const user = DB.AppState.currentUser;
      if (!user) return;
      const av = document.getElementById('user-avatar');
      const nm = document.getElementById('user-name');
      const rl = document.getElementById('user-role');
      if (av) av.textContent = (user.name || 'U').charAt(0).toUpperCase();
      if (nm) nm.textContent = user.name || user.username;
      if (rl) rl.textContent = { admin: 'Administrateur', pharmacien: 'Pharmacien', caissier: 'Caissier' }[user.role] || user.role;

      const settingsBtn = document.getElementById('topbar-settings-btn');
      if (settingsBtn) {
        settingsBtn.style.display = user.role === 'admin' ? 'flex' : 'none';
      }
    }

    function navigatePage(page) {
      // Cleanup mobile POS tab bar si on quitte le POS
      if (typeof mobileCleanupPOS === 'function') mobileCleanupPOS();
      document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.page === page));
      const t = document.getElementById('topbar-title');
      if (t) t.textContent = PAGE_TITLES[page] || page;
      closeSidebarMobile();
      Router.navigate(page);
    }

    function updateNetworkStatus() {
      const online = navigator.onLine;
      const dot = document.getElementById('sync-dot');
      const text = document.getElementById('sync-text');
      if (dot) dot.className = 'sync-dot ' + (online ? 'online' : 'offline');
      if (text) text.textContent = online ? 'En ligne' : 'Hors ligne';
      DB.AppState.isOnline = online;
    }
    window.addEventListener('online', () => { updateNetworkStatus(); UI.toast('Connexion rétablie', 'success'); });
    window.addEventListener('offline', () => { updateNetworkStatus(); UI.toast('Mode hors ligne activé', 'warning'); });

    async function updateAlertBadge() {
      try {
        const alerts = await DB.dbGetAll('alerts');
        const count = alerts.filter(a => a.status === 'unread').length;
        const badge = document.getElementById('notif-count');
        if (badge) { badge.style.display = count > 0 ? 'flex' : 'none'; badge.textContent = count > 9 ? '9+' : count; }
      } catch (e) { }
    }

    Router.register('metrics', (container) => renderMetrics(container));
    Router.register('onboarding', (container) => renderOnboarding(container));

    // Route 'alerts' enregistrée dans js/pages/alerts.js

    async function clearAllAlerts() {
      const all = await DB.dbGetAll('alerts');
      for (const a of all.filter(a => a.status === 'unread')) await DB.dbPut('alerts', { ...a, status: 'read' });
      UI.toast('Toutes les alertes marquées comme lues', 'success');
      await updateAlertBadge();
      Router.navigate('alerts');
    }
    async function dismissAlertItem(id) {
      const a = await DB.dbGet('alerts', id);
      if (a) await DB.dbPut('alerts', { ...a, status: 'read' });
      await updateAlertBadge();
      Router.navigate('alerts');
    }
    window.clearAllAlerts = clearAllAlerts;
    window.dismissAlertItem = dismissAlertItem;
    window.dismissAlert = dismissAlertItem;

    let _pwaPrompt = null;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault(); _pwaPrompt = e;
      const b = document.getElementById('pwa-install-btn');
      if (b) b.style.display = 'flex';
      // Show install banner if not in standalone mode
      if (!window.matchMedia('(display-mode: standalone)').matches) {
        showPWAInstallBanner();
      }
    });

    function showPWAInstallBanner() {
      if (document.getElementById('pwa-install-banner')) return;
      if (localStorage.getItem('pwa-banner-dismissed')) return;
      const banner = document.createElement('div');
      banner.id = 'pwa-install-banner';
      banner.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:2001;background:linear-gradient(135deg,#1B6FAE,#2EAF7D);color:white;padding:14px 20px;border-radius:14px;box-shadow:0 8px 30px rgba(0,0,0,0.25);display:flex;align-items:center;gap:14px;max-width:460px;width:calc(100% - 40px);font-family:Inter,system-ui,sans-serif;animation:slideUp 0.4s ease';
      banner.innerHTML = '<div style="flex:1"><strong style="font-size:14px;display:block;margin-bottom:2px">📲 Installer OrdiveX</strong><span style="font-size:12px;opacity:0.9">Installez l\'app pour une expérience native sans barre du navigateur</span></div><button onclick="installPWA()" style="background:white;color:#1B6FAE;border:none;padding:8px 16px;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap">Installer</button><button onclick="dismissPWABanner()" style="background:none;border:none;color:white;opacity:0.7;cursor:pointer;font-size:18px;padding:4px">✕</button>';
      document.body.appendChild(banner);
    }

    function dismissPWABanner() {
      const banner = document.getElementById('pwa-install-banner');
      if (banner) banner.remove();
      localStorage.setItem('pwa-banner-dismissed', '1');
    }
    window.dismissPWABanner = dismissPWABanner;

    async function installPWA() {
      if (!_pwaPrompt) { UI.toast('Application déjà installée ou non disponible', 'info'); return; }
      _pwaPrompt.prompt();
      const r = await _pwaPrompt.userChoice;
      if (r.outcome === 'accepted') {
        UI.toast('OrdiveX installé ! L\'app se lancera sans barre du navigateur.', 'success', 5000);
        document.getElementById('pwa-install-btn').style.display = 'none';
        dismissPWABanner();
      }
      _pwaPrompt = null;
    }
    window.installPWA = installPWA;
    window.closeSidebarMobile = closeSidebarMobile;

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(r => { console.log('[SW] OK:', r.scope); })
        .catch(e => console.warn('[SW] Erreur:', e));
    }

    document.addEventListener('keydown', e => {
      if (!DB.AppState.currentUser) return;
      if ((e.ctrlKey || e.metaKey)) {
        const map = { '1': 'dashboard', '2': 'pos', '3': 'stock', '4': 'prescriptions', '5': 'caisse', 'p': 'print' };
        if (map[e.key]) { e.preventDefault(); navigatePage(map[e.key]); }
        if (e.key === 'b') { e.preventDefault(); doBackup && doBackup(); }
      }
      if (e.key === 'Escape') UI.closeModal && UI.closeModal();
    });

    async function initApp() {
      try {
        UI.initTheme();
        if (window.CommandPalette) CommandPalette.init();
        await DB.initDB();
        await DB.seedDemoData();
        if (window.updatePharmacyDisplay) await updatePharmacyDisplay();

        // --- Check if pharmacy is already configured ---
        let settings = await DB.dbGetAll('settings');
        let onboardingDone = settings.find(s => s.key === 'onboarding_done')?.value || localStorage.getItem('onboarding_done') === 'true';
        const hasSupabase = settings.find(s => s.key === 'supabase_url')?.value;

        // console.log('[App] Debug Onboarding:', { onboardingDone, hasSupabase, settingsCount: settings.length });

        // If Supabase configured but onboarding not done locally
        if (!onboardingDone && hasSupabase) {
          console.log('[App] Supabase detected. Forcing onboarding_done to true.');
          onboardingDone = true;
          await DB.dbPut('settings', { key: 'onboarding_done', value: true });
          localStorage.setItem('onboarding_done', 'true');

          if (navigator.onLine) {
            const main = document.getElementById('app-content');
            if (main) main.innerHTML = '<div class="loader-container"><div class="spinner"></div><p>Synchronisation Cloud...</p></div>';
            DB.pullFromSupabase().catch(e => console.warn('[App] Background pull failed:', e));
          }
        }

        // Fresh check of onboarding status after potential pull
        const finalSettings = await DB.dbGetAll('settings');
        onboardingDone = finalSettings.find(s => s.key === 'onboarding_done')?.value || localStorage.getItem('onboarding_done') === 'true';

        if (!onboardingDone) {
          console.log('[App] Onboarding required.');
          Router.currentPage = 'onboarding';
          DB.AppState.currentPage = 'onboarding';
          const main = document.getElementById('app-content');
          main.innerHTML = '';
          renderOnboarding(main);
          return;
        }

        const session = await Auth.restoreSession();
        if (session) {
          initSidebar();
          updateTopbar();
          Router.navigate('dashboard');
        } else {
          Router.navigate('login');
        }

        updateNetworkStatus();
        setInterval(updateAlertBadge, 120000);

        // ── Auto-backup (toutes les 30 min) et auto-pull cloud (toutes les 5 min) ──
        if (DB.startAutoBackup) DB.startAutoBackup();
        if (DB.startAutoPull) DB.startAutoPull();
      } catch (err) {
        console.error('Init failed:', err);
        document.getElementById('app-content').innerHTML =
          '<div class="error-state"><div style="font-size:48px"><i data-lucide="alert-triangle"></i></div><h2>Erreur de démarrage</h2>'
          + '<p>' + err.message + '</p><button class="btn btn-primary" style="margin-top:16px" onclick="location.reload()">Recharger</button></div>';
        if (window.lucide) lucide.createIcons();
      }
    }

    window.initSidebar = initSidebar;
    window.updateTopbar = updateTopbar;
    window.navigatePage = navigatePage;
    window.toggleSidebar = toggleSidebar;
    window.updateAlertBadge = updateAlertBadge;

    // Force SW update on load
    window.addEventListener('load', () => {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistration().then(reg => {
          if (reg && reg.active) {
            try { reg.update(); } catch (e) { console.warn('[SW] Update skipped:', e); }
          }
        }).catch(() => { });
      }
    });

    initApp();
    if (window.lucide) {
      lucide.createIcons();
    }
  </script>
</body>

</html>
